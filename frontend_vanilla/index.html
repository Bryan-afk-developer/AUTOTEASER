<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTeaser - Procesador de Estados de Cuenta</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo-placeholder" id="logo-area">
                <!-- Logo goes here (media folder) -->
                <span class="logo-text">AT</span>
            </div>
            <h1 class="app-title">Auto<span class="accent">Teaser</span></h1>
        </div>
        <div class="header-right">
            <span class="status-dot" id="status-dot"></span>
            <span class="status-text" id="status-text">Conectando...</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Upload Section -->
        <section class="upload-section">
            <div class="upload-zone" id="upload-zone">
                <div class="upload-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <p class="upload-text">Arrastra tu estado de cuenta aquí</p>
                <p class="upload-subtext">o haz clic para seleccionar un PDF</p>
                <input type="file" id="file-input" accept=".pdf" hidden>
            </div>
        </section>

        <!-- Result Section (hidden initially) -->
        <section class="result-section" id="result-section" style="display: none;">
            <!-- File Info Card -->
            <div class="card file-card">
                <div class="card-header">
                    <h2>Documento</h2>
                    <button class="btn-icon" id="btn-delete" title="Eliminar">✕</button>
                </div>
                <div class="card-body">
                    <div class="info-row">
                        <span class="info-label">Archivo:</span>
                        <span class="info-value" id="info-filename">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Páginas:</span>
                        <span class="info-value" id="info-pages">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Banco detectado:</span>
                        <span class="info-value bank-badge" id="info-bank">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Estado:</span>
                        <span class="info-value status-badge" id="info-status">-</span>
                    </div>
                </div>
            </div>

            <!-- Text Preview Card -->
            <div class="card">
                <div class="card-header">
                    <h2>Vista previa del texto</h2>
                </div>
                <div class="card-body">
                    <pre class="text-preview" id="text-preview">-</pre>
                </div>
            </div>

            <!-- Actions -->
            <div class="actions">
                <button class="btn btn-primary" id="btn-process" disabled>
                    <span class="btn-spinner" id="process-spinner" style="display:none;"></span>
                    Procesar documento
                </button>
            </div>

            <!-- Parsed Data Card (hidden until processed) -->
            <div class="card" id="parsed-card" style="display: none;">
                <div class="card-header">
                    <h2>Datos extraídos</h2>
                </div>
                <div class="card-body">
                    <pre class="parsed-data" id="parsed-data">-</pre>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast notification -->
    <div class="toast" id="toast">
        <span id="toast-msg"></span>
    </div>

    <script src="app.js"></script>
</body>
</html>
